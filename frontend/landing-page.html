<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing AI · Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            ink: '#030712',
                            dusk: '#0f172a',
                            foam: '#0ea5e9',
                            mint: '#10b981',
                            gold: '#fbbf24'
                        }
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['IBM Plex Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen overflow-hidden bg-slate-50 text-slate-900 dark:bg-brand-ink dark:text-slate-100 transition-colors">
    <div class="glow bg-brand-foam/25 -top-40 left-1/3"></div>
    <div class="glow bg-brand-leaf/20 bottom-0 right-0"></div>

    <div class="relative z-10 h-screen flex overflow-hidden">
        <aside class="console-sidebar glass-panel card-shadow" data-sidebar data-collapsed="false">
            <div class="sidebar-top">
                <a href="index.html" class="sidebar-brand" data-sidebar-brand>
                    <img src="assets/logo/landbank-logo.png" alt="LandBank logo" class="sidebar-logo">
                    <div class="sidebar-brand-text">
                        <span class="sidebar-brand-title">Testing AI</span>
                        <span class="sidebar-brand-tagline">Anti-Fraud Console</span>
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav" aria-label="Primary">
                <a href="#console" class="sidebar-link is-active">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="6" width="12" height="12" rx="3"></rect>
                            <path d="M9 9h6v6H9z"></path>
                        </svg>
                    </span>
                    <span class="sidebar-label">Console</span>
                </a>
                <a href="pages/workflow.html" class="sidebar-link">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 12a6 6 0 0 1 10.39-4.25L18 6v5"></path>
                            <path d="M18 12a6 6 0 0 1-10.39 4.25L6 18v-5"></path>
                        </svg>
                    </span>
                    <span class="sidebar-label">Workflow</span>
                </a>
                <a href="pages/security.html" class="sidebar-link">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3l7 3v5c0 5.25-3 8.58-7 10-4-1.42-7-4.75-7-10V6z"></path>
                            <path d="M12 11v4"></path>
                        </svg>
                    </span>
                    <span class="sidebar-label">Security</span>
                </a>
                <a href="pages/pricing.html" class="sidebar-link">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="7"></circle>
                            <path d="M12 8v8"></path>
                            <path d="M9.5 9.5a3 3 0 0 1 5 0"></path>
                        </svg>
                    </span>
                    <span class="sidebar-label">Pricing</span>
                </a>
            </nav>
            <div class="sidebar-divider" aria-hidden="true"></div>
            <section class="chat-history" aria-label="Chat history">
                <div class="chat-history__header">
                    <p class="chat-history__eyebrow">Chat history</p>
                </div>
                <div class="chat-history__list">
                    <ul class="chat-thread" role="list">
                        <li>
                            <button type="button" class="chat-thread__item is-active">
                                <div class="chat-thread__meta">
                                    <span class="chat-thread__label">CFIR-2403</span>
                                    <span class="chat-thread__time">3m ago</span>
                                </div>
                                <p>Disputed call logs and reissued card follow-up draft.</p>
                            </button>
                        </li>
                        <li>
                            <button type="button" class="chat-thread__item">
                                <div class="chat-thread__meta">
                                    <span class="chat-thread__label">SAR-1188</span>
                                    <span class="chat-thread__time">Today</span>
                                </div>
                                <p>ACH fraud escalation w/ branch statements attached.</p>
                            </button>
                        </li>
                        <li>
                            <button type="button" class="chat-thread__item">
                                <div class="chat-thread__meta">
                                    <span class="chat-thread__label">INS-0934</span>
                                    <span class="chat-thread__time">Yesterday</span>
                                </div>
                                <p>Internal access review with HR disposition checklist.</p>
                            </button>
                        </li>
                        <li>
                            <button type="button" class="chat-thread__item">
                                <div class="chat-thread__meta">
                                    <span class="chat-thread__label">CFIR-2398</span>
                                    <span class="chat-thread__time">Mar 4</span>
                                </div>
                                <p>High-value scam ring — summarize outbound call tree.</p>
                            </button>
                        </li>
                    </ul>
                </div>
            </section>
            <div class="sidebar-meta">
                <p>Anti-Fraud Desk</p>
                <p>© <span id="year"></span> Testing AI</p>
            </div>
            <a href="index.html" class="sidebar-logout" aria-label="Logout">
                Logout
            </a>
            <button type="button" class="sidebar-fab" aria-label="Collapse sidebar" data-sidebar-toggle data-direction="collapse">
                <span class="sidebar-fab__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 6l6 6-6 6"></path>
                    </svg>
                </span>
            </button>
        </aside>

        <div class="flex-1 flex flex-col min-h-0">
            <main class="console-main flex-1 min-h-0">
                <section id="console" class="console-stage min-h-0">
                    <div class="console-frame glass-panel card-shadow">
                        <div class="conversation-feed" aria-live="polite">
                            <div class="conversation-feed__viewport">
                                <div id="feed-placeholder" class="conversation-feed__empty">
                                    <p>Drafts and CFIR answers will appear here. Pin your prompt below to begin.</p>
                                </div>
                                <div id="loading-indicator" class="conversation-feed__loading hidden">
                                    <span class="loading-dot"></span>
                                    <span>Generating a CFIR response...</span>
                                </div>
                                <div id="error-container" class="conversation-feed__error hidden"></div>
                                <div id="result-container" class="conversation-feed__results"></div>
                            </div>
                        </div>

                        <form id="prompt-form" action="#" method="post" class="prompt-dock">
                            <div class="prompt-toolbar">
                                <p class="prompt-toolbar__label">Attachments</p>
                                <div class="prompt-toolbar__actions">
                                    <button type="button" class="inline-flex justify-center items-center gap-2 rounded-full border border-slate-200 dark:border-white/15 px-4 py-2.5 text-sm font-semibold">Upload PDF</button>
                                    <button type="button" class="inline-flex justify-center items-center gap-2 rounded-full border border-slate-200 dark:border-white/15 px-4 py-2.5 text-sm font-semibold">Upload DOCX</button>
                                    <button type="button" class="inline-flex justify-center items-center gap-2 rounded-full border border-slate-200 dark:border-white/15 px-4 py-2.5 text-sm font-semibold">Upload CSV/ZIP</button>
                                    <button type="button" class="inline-flex justify-center items-center gap-2 rounded-full border border-slate-200 dark:border-white/15 px-4 py-2.5 text-sm font-semibold">Other formats</button>
                                </div>
                            </div>

                            <div class="prompt-field">
                                <label for="prompt-input" class="sr-only">Prompt</label>
                                <textarea id="prompt-input" rows="4" placeholder="Summarize case CFIR-2403 with emphasis on call logs and disputed charges." class="prompt-input"></textarea>
                                <button type="submit" id="submit-button" class="prompt-send-button inline-flex items-center justify-center gap-2 rounded-full bg-brand-foam text-white dark:text-brand-ink font-semibold" data-state="idle">
                                    <span data-role="label">Send prompt</span>
                                    <svg data-role="spinner" class="hidden h-5 w-5 animate-spin text-white" viewBox="0 0 24 24" aria-hidden="true">
                                        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 0 1 8-8v4a4 4 0 0 0-4 4H4Z"></path>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js" defer></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>

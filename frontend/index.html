<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing AI · Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            ink: '#030712',
                            dusk: '#0f172a',
                            foam: '#0ea5e9',
                            mint: '#10b981',
                            gold: '#fbbf24'
                        }
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['IBM Plex Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-brand-ink dark:text-slate-100 transition-colors">
    <div class="glow bg-brand-foam/30 -top-24 -right-16"></div>
    <div class="glow bg-brand-leaf/20 bottom-0 -left-10"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        <header class="px-4 sm:px-6 lg:px-12 py-4 sm:py-6">
            <nav class="flex items-center justify-between text-xs sm:text-sm text-slate-500 dark:text-slate-300">
                <a href="landing-page.html" class="inline-flex items-center gap-3 font-medium tracking-[0.2em] uppercase">
                    <img src="assets/logo/landbank-logo.png" alt="LandBank logo" class="h-10 w-10 rounded-xl border border-slate-200/60 dark:border-white/10 bg-white/80 dark:bg-white/5 object-contain">
                    Testing AI
                </a>
                <div class="flex items-center gap-3">
                    <a href="pages/forgot-password.html" class="hover:text-brand-foam">Need help?</a>
                </div>
            </nav>
        </header>

        <main class="flex flex-1 items-center justify-center px-4 sm:px-6 lg:px-12 pb-12 lg:pb-16">
            <section class="w-full max-w-lg">
                <div class="glass-panel rounded-3xl p-6 sm:p-8 md:p-10 card-shadow">
                    <div class="flex items-center gap-4">
                        <div class="h-12 w-12 rounded-2xl bg-brand-foam/15 border border-white/30 dark:border-white/10 flex items-center justify-center">
                            <svg aria-hidden="true" viewBox="0 0 24 24" class="h-6 w-6 text-brand-foam">
                                <path fill="currentColor" d="M12 2a7 7 0 0 0-7 7v4.25a3.75 3.75 0 0 0 3 3.674V19a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2.076A3.75 3.75 0 0 0 19 13.25V9a7 7 0 0 0-7-7Zm0 2a5 5 0 0 1 5 5v4.25c0 .69-.56 1.25-1.25 1.25H8.25A1.25 1.25 0 0 1 7 13.25V9a5 5 0 0 1 5-5Zm-2 12.5h4V19h-4Z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-[0.4em] text-slate-500 dark:text-slate-400">Testing AI</p>
                            <h1 class="text-2xl sm:text-3xl font-display font-semibold">Testing AI Console</h1>
                        </div>
                    </div>

                    <form class="mt-8 space-y-5 sm:space-y-6" action="landing-page.html" method="get">
                        <div>
                            <label for="email" class="text-sm sm:text-base font-medium text-slate-600 dark:text-slate-200">Work email</label>
                            <input id="email" name="email" type="email" placeholder="agent@landbank.com" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-4 py-3 text-base sm:text-lg text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-brand-foam focus:ring-brand-foam">
                        </div>
                        <div>
                            <label for="password" class="text-sm sm:text-base font-medium text-slate-600 dark:text-slate-200">Password</label>
                            <input id="password" name="password" type="password" placeholder="••••••••" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-4 py-3 text-base sm:text-lg text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-brand-foam focus:ring-brand-foam">
                        </div>

                        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between text-sm sm:text-base text-slate-500 dark:text-slate-300">
                            <label class="inline-flex items-center gap-2">
                                <input type="checkbox" class="rounded border-slate-300 bg-white text-brand-foam focus:ring-brand-foam dark:border-white/30 dark:bg-white/10">
                                Remember device
                            </label>
                            <a href="pages/forgot-password.html" class="text-brand-foam font-semibold">Forgot password?</a>
                        </div>

                        <button type="submit" class="w-full inline-flex justify-center rounded-2xl bg-brand-foam py-3.5 sm:py-4 text-base sm:text-lg font-semibold text-white dark:text-brand-ink focus-visible:ring-2 focus-visible:ring-brand-foam focus-visible:ring-offset-2 focus-visible:ring-offset-slate-50 dark:focus-visible:ring-offset-brand-ink">Open workspace</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
